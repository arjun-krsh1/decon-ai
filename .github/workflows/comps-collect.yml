name: Comps Nemesis — collect snapshot

# Runs automatically once a day (~06:00 UTC). No manual work for the team.
# Shopify collection is free, so daily catches launches within 24h at no cost.
# "workflow_dispatch" also lets an admin trigger it by hand anytime.
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Collect competitor snapshot
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: python collect.py
