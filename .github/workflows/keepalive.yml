name: Keep app awake

# Streamlit Community Cloud naps a free app after a stretch with no visitors,
# which is why the team keeps landing on the "Zzzz" sleep page. This pings the
# app on a schedule so it stays warm. The repo is public, so Actions minutes
# are unlimited — this costs nothing.
on:
  schedule:
    # every 5 min. GitHub may space out high-frequency crons under load
    # (best-effort), but that's still frequent enough to keep the app warm.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions: {}   # no repo token needed — this only curls an external URL

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping the Streamlit app
        run: |
          URL="https://decon-ai-jinqjddehdahbk8wzsnm7w.streamlit.app/"
          for i in 1 2 3; do
            code=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 60 "$URL" || echo 000)
            echo "attempt $i -> HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 15
          done
          echo "app did not return 200 after retries (it may be mid-wake) - non-fatal"
